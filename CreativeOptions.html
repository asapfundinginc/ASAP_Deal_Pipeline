<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Options — ASAP Funding</title>
<style>
  :root{--bg:#f6f8fb;--card:#fff;--ink:#1e293b;--mut:#64748b;--blue:#2563eb;--blue-lt:#eff6ff;--blue-bd:#bfdbfe;
  --green:#16a34a;--green-bg:#f0fdf4;--amber:#b45309;--amber-bg:#fffbeb;--amber-bd:#fde68a;--red:#dc2626;--red-bg:#fef2f2;
  --line:#e2e8f0;--mono:"SF Mono",Consolas,Menlo,monospace}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font:13.5px/1.45 -apple-system,"Segoe UI",system-ui,sans-serif;color:var(--ink);background:var(--bg);padding-bottom:60px}
  .topbar{background:#0f2b52;color:#fff;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
  .topbar b{font-size:15px}
  .topbar select{font:inherit;border-radius:6px;border:0;padding:6px 9px;font-weight:700;color:#0f2b52}
  .wrap{max-width:1240px;margin:14px auto;padding:0 16px}
  .sponsor{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin-bottom:12px;display:flex;gap:18px;flex-wrap:wrap;align-items:center}
  .sponsor .t{font-size:11px;font-weight:800;color:#0f2b52}
  .sponsor label{font-size:11.5px;color:var(--mut)}
  .sponsor input,.sponsor select{font-family:var(--mono);font-size:12.5px;padding:4px 7px;border:1px solid var(--line);border-radius:6px;width:96px}
  .sponsor select{font-family:inherit;width:auto}
  .statbar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
  @media(max-width:900px){.statbar{grid-template-columns:1fr 1fr}}
  .stat{border-radius:10px;padding:10px 12px;text-align:center;border:1px solid var(--line);background:var(--card)}
  .stat .lbl{font-size:9.5px;font-weight:800;letter-spacing:.5px;color:var(--mut)}
  .stat .val{font-family:var(--mono);font-size:18px;font-weight:800;margin-top:2px}
  .stat.ok{background:var(--green-bg);border-color:#bbf7d0}.stat.ok .val{color:var(--green)}
  .stat.warn{background:var(--amber-bg);border-color:var(--amber-bd)}.stat.warn .val{color:var(--amber)}
  .legs{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  @media(max-width:1020px){.legs{grid-template-columns:1fr}}
  .leg{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .leg.off{opacity:.42}
  .lhead{padding:9px 13px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
  .lhead .t{font-size:11px;font-weight:800;color:#0f2b52}
  .onoff{font-size:10px;font-weight:800;cursor:pointer;background:var(--blue);border:0;color:#fff;border-radius:5px;padding:3px 9px}
  .leg.off .onoff{background:#94a3b8}
  .addr{width:100%;margin-top:6px;font-size:11.5px;font-weight:700;padding:4px 8px;border:1px solid var(--line);border-radius:14px;background:#0f2b52;color:#fff}
  .selgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:9px 13px;background:var(--blue-lt);border-bottom:1px solid var(--line)}
  .selgrid label{display:block;font-size:9.5px;font-weight:800;color:var(--mut)}
  .selgrid select{width:100%;font-size:12px;font-weight:700;color:#0f2b52;padding:4px 6px;border:1px solid var(--blue-bd);border-radius:6px;background:#fff}
  .body{padding:9px 13px}
  .row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:3px 0}
  .row label{font-size:12px;color:var(--mut);flex:1}
  .row input,.row select{width:104px;text-align:right;font-family:var(--mono);font-size:12.5px;padding:4px 7px;border:1px solid var(--line);border-radius:6px;background:#fbfdff}
  .row select{font-family:inherit;text-align:left}
  .row input:focus{outline:2px solid var(--blue)}
  .out{display:flex;justify-content:space-between;padding:4px 0;font-size:12.5px;border-top:1px dashed var(--line)}
  .out b{font-family:var(--mono)}
  .out.key{background:var(--blue-lt);margin:8px -13px 0;padding:8px 13px;border-top:1px solid var(--blue-bd)}
  .out.key b{color:var(--blue);font-size:13.5px}
  .btnrow{display:flex;gap:6px;margin:8px 0 2px}
  .mini{flex:1;background:#fff;border:1.5px solid var(--blue);color:var(--blue);border-radius:8px;padding:6px 3px;font-size:11px;font-weight:800;cursor:pointer}
  .mini.on{background:var(--blue);color:#fff}
  .mini.solver{border-color:var(--green);color:var(--green)}
  .panel{display:none;background:#fafcff;border:1px solid var(--line);border-radius:8px;padding:7px 10px;margin-top:7px}
  .panel.open{display:block}
  .panel .ph{font-size:9.5px;font-weight:800;color:var(--mut);margin-bottom:4px}
  .chip{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--line);border-radius:8px;padding:5px 8px;margin-bottom:4px;font-size:11.5px;background:#fff;cursor:pointer}
  .chip.sel{border-color:var(--blue);background:var(--blue-lt)}
  .chip .nm{font-weight:700}.chip .why{font-size:10px;color:var(--mut)}
  .fit{font-size:9px;font-weight:800;padding:2px 6px;border-radius:8px;background:var(--green-bg);color:var(--green)}
  .outputs{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-top:14px;overflow:hidden}
  .tabs{display:flex;border-bottom:1px solid var(--line);background:#f1f5f9}
  .tab{flex:1;padding:10px;font-size:12px;font-weight:800;color:var(--mut);text-align:center;cursor:pointer;border:0;background:none}
  .tab.on{background:#fff;color:var(--blue);border-bottom:2.5px solid var(--blue)}
  .tabbody{display:none;padding:14px 16px}
  .tabbody.on{display:block}
  .copybar{display:flex;gap:10px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
  .cta{background:var(--blue);color:#fff;border:0;border-radius:8px;padding:9px 16px;font-size:12.5px;font-weight:700;cursor:pointer}
  .seg{display:flex;border:1.5px solid var(--blue);border-radius:8px;overflow:hidden}
  .seg button{padding:8px 14px;font-size:11px;font-weight:800;border:0;background:#fff;color:var(--blue);cursor:pointer}
  .seg button.on{background:var(--blue);color:#fff}
  .copied2{color:var(--green);font-weight:700;display:none;font-size:12px}
  #emailPrev{border:1px solid var(--line);border-radius:8px;overflow:auto;background:#fff}

  .wfrow{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;font-size:13px;border-bottom:1px dashed var(--line)}
  .wfrow b{font-family:var(--mono);white-space:nowrap}
  .wfrow.head{border-bottom:2px solid var(--ink);padding-bottom:6px;margin-bottom:2px}
  .wfrow.head>span:first-child{font-size:11px;font-weight:800;letter-spacing:.08em;color:var(--mut)}
  .wfrow.sub{font-size:12.5px;color:#475569}
  .wfrow.gap{border-bottom:0;border-top:2px solid var(--ink);margin-top:4px;padding-top:8px}
  .wfrow.gap>span:first-child{font-size:15px;font-weight:800;color:var(--ink)}
  .wfrow.gap>b{font-size:17px}
  /* v19: dot leaders — connect label to number across the white space */
  .wfrow>span:first-child{flex:1;display:flex;align-items:baseline;min-width:0}
  .wfrow>span:first-child::after{content:"";flex:1;margin:0 8px;border-bottom:1.5px dotted #b6c2d1;transform:translateY(-3px)}
  .wfrow.head>span:first-child::after{border-bottom:0}
  .wfrow.head{font-size:11px;font-weight:800;letter-spacing:.5px;color:#0f2b52;border-bottom:1px solid var(--line);padding-bottom:6px}
  .wfrow.sub{padding-left:16px;color:var(--mut);font-size:12.5px}
  .wfrow.total{border-bottom:0;padding-top:7px}
  .wfok{background:var(--green-bg);border:1px solid #bbf7d0;color:var(--green);border-radius:8px;padding:7px 12px;margin-top:8px;font-weight:800;font-size:12.5px}
  .wfshort{background:var(--red-bg);border:1px solid #fecaca;color:var(--red);border-radius:8px;padding:7px 12px;margin-top:8px;font-weight:800;font-size:12.5px}
  .wfexit{background:var(--blue-lt);border:1px solid var(--blue-bd);color:#0f2b52;border-radius:8px;padding:7px 12px;margin-top:8px;font-size:12.5px}
  /* v19: inline solver icon next to the Loan Amount input */
  .icoSolve{background:#fff;border:1.5px solid var(--green);color:var(--green);border-radius:6px;font-size:12px;font-weight:800;cursor:pointer;padding:3px 7px;line-height:1}
  .icoSolve:hover{background:var(--green);color:#fff}
  /* v19: split view — inputs left, sticky live email right */
  .wrap.split{max-width:1720px;display:grid;grid-template-columns:minmax(0,1.12fr) minmax(400px,.88fr);gap:0 14px;align-items:start}
  .wrap.split>*{grid-column:1}
  .wrap.split>.outputs{grid-column:2;grid-row:1/span 20;position:sticky;top:12px;margin-top:0;max-height:calc(100vh - 24px);overflow:auto}
  .wrap.split .legs{grid-template-columns:1fr 1fr}
  @media(max-width:1450px){.wrap.split .legs{grid-template-columns:1fr}}
  @media(max-width:1020px){.wrap.split{display:block}.wrap.split>.outputs{position:static;max-height:none}}
  /* v19: paste-to-parse box */
  #dealPaste{width:100%;height:64px;font:12.5px/1.4 inherit;padding:8px 10px;border:1px solid var(--line);border-radius:8px;resize:vertical;margin-top:6px}
  #parseMsg{font-size:11px;color:var(--mut);margin-top:4px}
  .parseBtn{background:var(--green);color:#fff;border:0;border-radius:8px;padding:6px 12px;font-size:11.5px;font-weight:800;cursor:pointer}
</style>
</head>
<body>
<div class="topbar">
  <div><b>⚡ Creative Options</b> · multi-leg deal structuring · ES pricing · borrower email</div>
  <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
  <label style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;cursor:pointer;background:rgba(255,255,255,.12);padding:6px 12px;border-radius:8px">
    <input type="checkbox" id="prefLayout" onchange="togglePref()" style="width:15px;height:15px;accent-color:#7fb3d3"> ★ Preferred layout
  </label>
  <label style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;cursor:pointer;background:rgba(255,255,255,.12);padding:6px 12px;border-radius:8px">
    <input type="checkbox" id="splitView" onchange="toggleSplit()" style="width:15px;height:15px;accent-color:#7fb3d3"> ⬒ Live email preview
  </label>
  <span><label style="font-size:11px;margin-right:6px">SCENARIO PRESET</label>
  <select id="preset" onchange="applyPreset()">
    <option value="brrrr" selected>Cash-out source → Purchase+Rehab → DSCR exit (BRRRR)</option>
    <option value="simple">Purchase + takeout (borrower has down) — Leg A OFF</option>
    <option value="guc">Ground-up → DSCR perm</option>
    <option value="comm">Commercial bridge → NOI perm take-out</option>
    <option value="cashperm">Cash-out bridge → DSCR perm (no purchase)</option>
  </select></span>
</div>
</div>

<div class="wrap" id="mainWrap">
<div class="sponsor" style="display:block">
  <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
    <span class="t">⚡ PASTE DEAL SCENARIO — auto-fills the legs</span>
    <button class="parseBtn" onclick="parseScenario()">Parse &amp; fill</button>
  </div>
  <textarea id="dealPaste" placeholder="Paste the investor's email or deal notes. Pulls: borrower name, FICO, purchase price, rehab budget, ARV, rent, as-is value, payoff balance, borrower cash, address."></textarea>
  <div id="parseMsg"></div>
</div>
<div class="sponsor">
  <span class="t">SPONSOR</span>
  <span><label>Borrower </label><input type="text" id="spName" value="" placeholder="auto-fills from deal" style="width:170px;font-family:inherit;text-align:left"></span>
  <span><label>FICO </label><input type="number" id="spFico" value="665" step="1"></span>
  <span><label>Experience </label><select id="spExp"><option value="0">Tier 0 — 0 deals completed</option><option value="1">Tier 1 — 1 deal completed</option><option value="2-4" selected>Tier 2-4 — 2-4 deals completed</option><option value="5+">Tier 5+ — 5+ deals completed</option></select></span>
  <span><label>Entity </label><select><option selected>LLC</option><option>Individual</option><option>LP</option><option>Trust</option></select></span>
  <span><label>Borrower cash </label><span style="display:inline-flex;align-items:center;gap:3px"><span style="color:#94a3b8">$</span><input type="text" inputmode="decimal" id="spCash" value="40,000" onblur="this.value=fmtIn(parseFloat(String(this.value).replace(/,/g,''))||0)"></span></span>
</div>

<div id="waterfall" style="background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 16px;margin-bottom:12px"></div>

<div class="legs" id="legs"></div>

<div class="outputs">
  <button id="emailToggle" onclick="toggleEmail()" style="width:100%;text-align:left;padding:12px 16px;font-size:12.5px;font-weight:800;color:#2563eb;background:#f1f5f9;border:0;cursor:pointer;letter-spacing:.3px">▸ BORROWER EMAIL (SHORT / DETAILED) — CLICK TO EXPAND</button>
  <div class="tabbody" id="tab0" style="display:none">
    <div class="copybar">
      <span class="seg">
        <button id="mShort" class="on" onclick="setMode('short')">SHORT SUMMARY</button>
        <button id="mDet" onclick="setMode('detailed')">DETAILED BREAKDOWN</button>
      </span>
      <button class="cta" onclick="copyEmail()">Copy email to clipboard (keeps formatting)</button>
      <span class="copied2" id="cp2">✓ Copied — paste into Gmail</span>
    </div>
    <div id="emailPrev"></div>
  </div>
</div>
</div>

<script>
/* ---------- CONFIG ---------- */
const PURPOSES={purchase:"Purchase",rt:"Rate & Term Refi",co:"Cash-Out Refi",dp:"Delayed Purchase Refi"};
const SOURCE_PURPOSES={co:"Cash-Out Refi",dp:"Delayed Purchase Refi"}; /* a Source-of-Funds leg only provides cash */
const EXIT_PURPOSES={rt:"Rate & Term Refi",co:"Cash-Out Refi",dp:"Delayed Purchase Refi"}; /* a take-out is always a refinance, never a purchase */
const PROGRAMS={bridge:"Bridge (IO)",ff:"Fix & flip / rehab loan",guc:"Ground-up construction loan",dscr:"30-yr DSCR loan",cperm:"Commercial perm (NOI DSCR)",land:"Land loan",gap:"2nd-position gap",heloc:"HELOC / SBLOC",sale:"Sale / Disposition (exit)"};
/* Programs valid per leg role: subject = property loans; source = cash generators; exit = take-outs/disposition */
const PROG_BY_ROLE={subject:['bridge','ff','guc','dscr','cperm','land'],source:['dscr','cperm','heloc','gap'],exit:['dscr','cperm','sale']};
function roleOf_(L){return L.role.includes("SOURCE")?'source':((L.role.includes("EXIT")||L.role.includes("TAKE-OUT"))?'exit':'subject');}
function progOpts_(L){var sub={};PROG_BY_ROLE[roleOf_(L)].forEach(function(k){sub[k]=PROGRAMS[k];});return opts(sub,L.program);}
const PROPS={sfr:"SFR",u24:"2-4 Unit",condo:"Condo/TH",mf5:"MF 5+",mixed:"Mixed-Use",com:"Commercial",land:"Land"};
const OCC={inv:"Investment (NOO)",vac:"Vacant",oo:"Owner-occ (business purpose)"};
/* v20: US effective property-tax rates (annual % of value, published state medians) + insurance estimate */
const STATE_TAX={AL:0.41,AK:1.19,AZ:0.62,AR:0.62,CA:0.75,CO:0.51,CT:2.15,DC:0.57,DE:0.58,FL:0.91,GA:0.92,HI:0.28,ID:0.69,IL:2.23,IN:0.85,IA:1.57,KS:1.41,KY:0.85,LA:0.55,ME:1.28,MD:1.07,MA:1.23,MI:1.48,MN:1.11,MS:0.81,MO:0.98,MT:0.83,NE:1.67,NV:0.59,NH:2.09,NJ:2.23,NM:0.80,NY:1.72,NC:0.82,ND:0.99,OH:1.56,OK:0.90,OR:0.93,PA:1.53,RI:1.63,SC:0.57,SD:1.24,TN:0.67,TX:1.68,UT:0.63,VT:1.90,VA:0.87,WA:0.94,WV:0.59,WI:1.73,WY:0.61};
const STATES={"":"— select —",AL:"AL",AK:"AK",AZ:"AZ",AR:"AR",CA:"CA",CO:"CO",CT:"CT",DC:"DC",DE:"DE",FL:"FL",GA:"GA",HI:"HI",ID:"ID",IL:"IL",IN:"IN",IA:"IA",KS:"KS",KY:"KY",LA:"LA",ME:"ME",MD:"MD",MA:"MA",MI:"MI",MN:"MN",MS:"MS",MO:"MO",MT:"MT",NE:"NE",NV:"NV",NH:"NH",NJ:"NJ",NM:"NM",NY:"NY",NC:"NC",ND:"ND",OH:"OH",OK:"OK",OR:"OR",PA:"PA",RI:"RI",SC:"SC",SD:"SD",TN:"TN",TX:"TX",UT:"UT",VT:"VT",VA:"VA",WA:"WA",WV:"WV",WI:"WI",WY:"WY"};
const INS_ANNUAL_PCT=0.35; /* investor DP hazard policy estimate, % of value/yr */
/* auto monthly T&I from state + value; HOA left to manual add via override */
function autoTI(state,value){if(!state||!STATE_TAX[state]||!(value>0))return null;
  const taxMo=value*(STATE_TAX[state]/100)/12, insMo=value*(INS_ANNUAL_PCT/100)/12;
  return Math.round(taxMo+insMo);}
/* internal ES cap defaults — engine sizes against these; no visible field needed */
function esLtvCap(prop,pur){const co=(pur==='co'||pur==='dp');
  if(prop==='com'||prop==='mixed'||prop==='mf5')return 70; /* commercial/mixed/MF5+ */
  if(prop==='u24')return 70; if(prop==='condo')return co?70:75; return co?75:75;}
function esDscrMin(){return 1.0;} /* ES standard floor; pricing LLPA already handles sub-1.0 bands */
/* fee fields itemized to match reference flyer */
const FEE=[["pts","Lender points %",1.5],["apts","ASAP funding points %",1.0],["proc","ASAP processing fee $",795],["uw","Underwriting / processing $",1500],["doc","Loan doc / processing $",2790],["esc","Escrow & title %",1.5],["appr","Appraisal & third-party $",650]];
/* v19: prepaids required at close on bridge-type legs (hazard paid upfront; tax proration/escrow) */
const PREPAID=[["haz","Prepaid hazard insurance $ (at close)",1500],["taxpro","Tax proration / escrow $ (at close)",0]];
const BRIDGE_TYPE=["ff","guc","bridge","hm","land"];
const PROGRAM_FIELDS={
  bridge:[["want","Loan amount",0],["rate","Rate % (IO)",0],["val","As-is value",800000],["term","Term (mo)",12]],
  ff:[["want","Loan amount",0],["rate","Rate % (IO)",0],["pp","Purchase price",525000],["rehab","Rehab budget (lender-held)",200000],["arv","ARV",1400000],["term","Term (mo)",12]],
  guc:[["want","Loan amount",0],["rate","Rate % (IO)",0],["pp","Land cost / basis",300000],["rehab","Construction budget",700000],["arv","Completed value",1500000],["term","Term (mo)",18]],
  dscr:[["want","Loan amount",0],["rate","Rate %",0],["val","As-is value",800000],["rent","Rent /mo (LT market)",7400],["ti","Taxes+ins+HOA /mo",900]],
  cperm:[["want","Loan amount",0],["rate","Rate %",0],["val","Value (stabilized)",2000000],["noi","NOI (annual, after expenses)",160000],["dyMin","Min debt yield %",0],["amYrs","Amortization (yrs)",25]],
  land:[["want","Loan amount",0],["rate","Rate % (IO)",13],["val","As-is land value",600000]],
  gap:[["want","2nd position loan amount",0],["rate","Rate % (IO)",13],["val","As-is value",800000],["bal1","Existing 1st balance",545000]],
  heloc:[["limit","Line limit",150000],["amt","Amount drawn",100000],["rate","Rate %",9.5]],
  sale:[["price","Sale price",1400000],["sellpct","Selling costs % (commissions + closing)",7]]};
const PURPOSE_FIELDS={rt:[["bal","Payoff (current debt)",545000]],co:[["bal","Payoff (current debt)",545000]],dp:[["bal","Cash basis to recoup",0]],purchase:[]};
const LENDERS=[
 {n:"Rodeo Lending",progs:["bridge","ff","guc","dscr"],fico:660,min:200000,max:10000000,why:"80% DSCR / F&F; existing relationship"},
 {n:"Kiavi",progs:["bridge","ff","dscr"],fico:680,min:50000,max:3000000,why:"F&F to 90% LTC; DSCR 75-80%"},
 {n:"Easy Street",progs:["bridge","ff","guc","dscr"],fico:620,min:75000,max:5000000,why:"EasyFix / EasyRent / EasyBuild"},
 {n:"Civic Financial",progs:["bridge","dscr","ff"],fico:660,min:75000,max:3500000,why:"660 FICO confirmed"},
 {n:"F2 Finance",progs:["bridge","ff"],fico:550,min:300000,max:3000000,why:"DC confirmed; low-FICO fallback"},
 {n:"Anchor Loans",progs:["ff","guc","bridge"],fico:0,min:100000,max:15000000,why:"75% ARV; experience-driven"}];

/* ============ v19 ES STANDARD-SERIES DSCR PRICING ENGINE ============
   Extracted verbatim from Easy Street's DSCR workbook (6-15-2026 matrix).
   Price LLPAs by CLTV bucket; auto-rate solves the 30-yr-fixed stack to par (100),
   honoring PPP-specific price ceilings. 5 pts = 1.00% rate in the quoting range. */

function esPriceAt(r){const S=ES_STACK;if(r<=S[0][0])return S[0][1];if(r>=S[S.length-1][0])return S[S.length-1][1];
  for(let i=1;i<S.length;i++){if(r<=S[i][0]){const [r0,p0]=S[i-1],[r1,p1]=S[i];return p0+(p1-p0)*(r-r0)/(r1-r0);}}return S[S.length-1][1];}

  for(let i=1;i<S.length;i++){if(p<=S[i][1]){const [r0,p0]=S[i-1],[r1,p1]=S[i];return r0+(r1-r0)*(p-p0)/(p1-p0);}}return S[S.length-1][0];}
function esQuote(c){

  const pm=(c.prop==='sfr')?ES_PROP.sfr:(c.prop==='condo')?ES_PROP.condo:(c.prop==='u24')?ES_PROP.u24:null;
  if(!pm)return{na:'Property type outside ES 1-4 resi DSCR box'};
  const purKey=(c.pur==='purchase')?'purchase':(c.pur==='co'||c.pur==='dp')?(c.fico>=720?'co720':'coLT'):'rt'; /* ES note [3]: cash back at close = cash-out pricing, incl. delayed purchase */
  const cells=[ES_FICO[fr][b],ES_DSCRADJ[esDscrRow(c.dscr)][b],ES_SIZE[sr][b],ES_PUR[purKey][b],pm[b],ES_PPP[c.ppp][b],c.io?ES_IOADJ[b]:0,c.st4?ES_ST4[b]:0];
  if(cells.some(x=>x===null))return{na:'Combination not priced by ES at this CLTV \u2014 outside ES box'};
  const llpa=cells.reduce((a,x)=>a+x,0);
  const ceil=ES_CEIL[c.ppp]!==undefined?ES_CEIL[c.ppp]:102;
  if(c.overrideRate>0){
    const pts=Math.round((100-Math.min(esPriceAt(c.overrideRate)+llpa,ceil))*1000)/1000;
    return{rate:c.overrideRate,pts:pts,llpa:llpa,bucket:b,override:true};
  }
  let target=Math.min(100,ceil);
  if(c.buyd==='buy1')target=Math.min(99,ceil);
  if(c.buyd==='credit1')target=Math.min(101,ceil);
  target=Math.max(96,target);
  const rate=Math.round(esRateAt(target-llpa)*1000)/1000;
  const pts=Math.round((100-target)*1000)/1000;
  return{rate:rate,pts:pts,llpa:llpa,bucket:b};
}

function solverMeta(L,i){

  const isSubject=(L.program==='ff'||L.program==='guc'||(L.purpose==='purchase'))&&!isExit;

  if(isExit&&(L.program==='dscr'||L.program==='cperm')&&(L.purpose==='rt'||L.purpose==='dp'))
    return {fn:'solveZero',short:'$0',tip:'SOLVE TO $0 — sizes this take-out loan just big enough to pay off the bridge (including any min-interest true-up) plus this leg\u2019s closing costs, so the borrower nets exactly $0 at the refi. Clamps to max qualifying if the target is too big.'};

    legs.forEach((X,j)=>{if(!X.on||j===i)return;const rr=compute(j,0);
      if(rr.cashNeed>0&&!(X.role.includes("EXIT")||X.role.includes("TAKE-OUT")))anyNeed=true;});

    return null;
  }
  if(isSubject) return {fn:'solveMyCash',short:'my cash',tip:'SOLVE TO MY CASH — sizes this loan so total cash-to-close (down payment + fees + prepaids + any collected interest reserve) exactly equals the borrower\u2019s available cash from the Sponsor bar. Clamps to max qualifying if the cash is too little.'};

function solveGap(i){
  let need=0;

    const r=compute(j,0);

function solveMyCash(i){

  const pre=BRIDGE_TYPE.includes(legs[i].program)?((v.haz||0)+(v.taxpro||0)):0; /* v19 */

  if((L.prop==='com'||L.prop==='mixed'||L.prop==='mf5')&&(v.ltv||0)>70&&(P==='cperm'||P==='bridge'||P==='hm')) o.hint2="Commercial/mixed-use/MF5+ typically caps 65-70% LTV — "+v.ltv+"% may be optimistic.";
  return o;
}

function fmtIn(n){return (n===0||n)?Number(n).toLocaleString('en-US'):'';}

function setSel(i,k,v){legs[i][k]=v;
  if(k==='program'){

       Rule: money keys (want, val, pp, rehab, arv, rent, ti, bal...) that exist in BOTH programs carry over;
       pricing keys (rate/LTV/LTC/term) take the NEW program's defaults; fees + prepaids always carry. */
    const old=legs[i].vals, nv={...old}; /* dormant keys survive round-trips (ff -> bridge -> ff keeps pp) */
    (PROGRAM_FIELDS[v]||[]).forEach(f=>{
      if(MONEY_KEYS.includes(f[0])){if(nv[f[0]]===undefined)nv[f[0]]=f[2];}
      else nv[f[0]]=f[2]; /* pricing keys (rate/LTV/LTC/term) take the NEW program's defaults */
    });
    FEE.forEach(f=>{if(nv[f[0]]===undefined)nv[f[0]]=f[2];});
    PREPAID.forEach(f=>{if(nv[f[0]]===undefined)nv[f[0]]=f[2];});
    (PURPOSE_FIELDS[legs[i].purpose]||[]).forEach(f=>{if(nv[f[0]]===undefined)nv[f[0]]=f[2];});
    legs[i].vals=nv;

  if(k==='purpose'){(PURPOSE_FIELDS[v]||[]).forEach(f=>{if(!(f[0] in legs[i].vals))legs[i].vals[f[0]]=f[2];});}

function pNum(s,mult){let n=parseFloat(String(s).replace(/,/g,''));if(!isFinite(n))return null;
  if(mult){const m=String(mult).toLowerCase();if(m==='k')n*=1000;if(m==='m'||m==='mm')n*=1000000;}
  return Math.round(n);}
function pGrab(text,label){
  const M='\\$?\\s*([\\d][\\d,]*(?:\\.\\d+)?)\\s*(k|m|mm)?\\b';
  const m=text.match(new RegExp('\\b'+label+'[^\\d$%]{0,25}'+M,'i'));
  return m?pNum(m[1],m[2]):null;}
function parseScenario(){
  const text=document.getElementById('dealPaste').value||'';
  const msg=document.getElementById('parseMsg');
  if(!text.trim()){msg.textContent='Nothing to parse — paste the deal notes first.';return;}
  const found=[];
  const ficoM=text.match(/(?:fico|credit(?:\s*score)?)\D{0,12}(\d{3})\b/i);
  const fico=ficoM?parseInt(ficoM[1],10):null;
  const pp=pGrab(text,'(?:purchase(?:\\s*price)?|buying(?:\\s*(?:it|at|for))?|under\\s*contract(?:\\s*(?:at|for))?)');
  const rehab=pGrab(text,'(?:rehab(?:\\s*budget)?|reno(?:vation)?(?:\\s*budget)?|construction\\s*budget)');
  const arv=pGrab(text,'(?:arv|after[-\\s]*repair(?:\\s*value)?)');
  const rent=pGrab(text,'(?:rents?\\s*(?:at|for|of|:)|monthly\\s*rent)');
  let cash=pGrab(text,'(?:cash(?!\\s*[- ]?out)(?:\\s*(?:on\\s*hand|available|to\\s*(?:work\\s*with|invest|close)))?|liquidity|liquid(?:\\s*(?:funds|assets))?)');
  if(cash===null){const cm=text.match(/\$?\s*([\d][\d,]*(?:\.\d+)?)\s*(k|m|mm)?\s+(?:in\s+)?(?:cash(?!\s*[- ]?out)|liquid)/i);if(cm)cash=pNum(cm[1],cm[2]);}
  const bal=pGrab(text,'(?:owes?|payoff|existing\\s*(?:balance|loan|debt)|current\\s*balance|mortgage\\s*balance)');
  const val=pGrab(text,'(?:worth|as[-\\s]?is(?:\\s*value)?|current\\s*value|appraised(?:\\s*(?:at|value|for))?)');
  const addrM=text.match(/(\d{1,6}\s+[A-Za-z0-9.'#\- ]{2,40}?\s(?:St(?:reet)?|Ave(?:nue)?|Rd|Road|Blvd|Boulevard|Dr(?:ive)?|Ln|Lane|Ct|Court|Pl(?:ace)?|Way|Ter(?:race)?|Cir(?:cle)?|Pkwy|Hwy)\.?(?:\s+(?:NE|NW|SE|SW|N|S|E|W)\b)?(?:,\s*[A-Za-z .]+)?(?:,?\s*[A-Z]{2}\b)?(?:\s*\d{5})?)/);
  const nameM=text.match(/(?:[Bb]orrower|[Cc]lient|[Ii]nvestor|[Ss]ponsor)(?:\s+[Nn]ame)?\s*[:\-]?\s+([A-Z][a-z]+(?:\s+[A-Z][a-z]+){0,2})/);
  /* target legs: subject = first ON non-exit leg; balance/value fall back to the first leg that owns the key */
  const isExitL=L=>L.role.includes("EXIT")||L.role.includes("TAKE-OUT");
  const subjIdx=legs.findIndex(L=>L.on&&!isExitL(L)&&L.purpose==='purchase');
  const subj=subjIdx>=0?subjIdx:legs.findIndex(L=>L.on&&!isExitL(L));
  const put=(idx,key,valNum,label)=>{if(valNum===null||idx<0)return;
    if(key in legs[idx].vals){legs[idx].vals[key]=valNum;found.push(label+' '+money(valNum));}};
  if(subj>=0){
    put(subj,'pp',pp,'purchase');
    put(subj,'rehab',rehab,'rehab');
    put(subj,'arv',arv,'ARV');
    put(subj,'rent',rent,'rent');

    if(addrM){legs[subj].addr=addrM[1].trim();found.push('address');}
  }
  if(val!==null&&(subj<0||!('val' in legs[subj].vals))){
    const vi=legs.findIndex(L=>L.on&&('val' in L.vals));
    put(vi,'val',val,'as-is value');
  }
  if(bal!==null){
    const bi=legs.findIndex(L=>L.on&&('bal' in L.vals));

  render();

}

    var prog=data.program||L.program, pur=data.purpose||L.purpose, prop=data.prop||L.prop, occ=data.occ||L.occ;
    var ov={want:0};
    ['pp','rehab','arv','val','rent','ti','noi','bal','pts','apts','esc','uw','doc','appr','proc'].forEach(function(k){
      if(data[k]!=null&&data[k]!==''&&isFinite(data[k])) ov[k]=Number(data[k]);
    });
    var fresh=makeLeg(L.role, (data.addr||L.addr), pur, prog, prop, occ, true, ov);
    if(data.state){ fresh.state=data.state;
      if(ov.ti==null && typeof autoTI==='function'){ var a=autoTI(data.state, ov.val||ov.pp||fresh.vals.val||0); if(a!=null){ fresh.vals.ti=a; fresh.tiAuto=true; } }
      else { fresh.tiTouched=true; fresh.tiAuto=false; }
    }
    legs[bi]=fresh;
    if(data.name){ var ne=document.getElementById('spName'); if(ne) ne.value=data.name; }
    if(data.fico!=null&&data.fico!==''){ var fe=document.getElementById('spFico'); if(fe) fe.value=String(data.fico); }
    if(data.exp){ var ee=document.getElementById('spExp'); if(ee) ee.value=String(data.exp); }
    if(typeof render==='function') render();
    if(typeof saveState==='function') saveState();
  }catch(e){}
}
(function(){
  function readHp(cb){

    try{ var m=/[?&]hp=([^&]+)/.exec(window.location.search||window.location.hash||''); cb(m?decodeURIComponent(m[1].replace(/\+/g,' ')):''); }catch(e2){ cb(''); }
  }
  function hpSig(hp){ try{ var d=JSON.parse(hp); var a=String(d.addr||'').toLowerCase().replace(/\s+/g,' ').trim(); return a || [d.program,d.pp||d.val||0,d.rehab||0,d.arv||0].join('|'); }catch(e){ return String(hp); } }
  function boot(){ if(typeof legs==='undefined'||typeof makeLeg!=='function'){ setTimeout(boot,100); return; }
    readHp(function(hp){
      var dealKey = hp ? hpSig(hp) : '__default';
      window.__dealKey = dealKey;
      function decide(serverRaw){
        if(serverRaw){ restoreFromJson(serverRaw); return; }                 /* durable layout for this deal -> restore it */
        var local=localRaw_(dealKey), localForThisDeal=false;
        if(local){ try{ var st=JSON.parse(local); localForThisDeal=(!hp)||(hpSig(hp)===(st.hpSig||'')); }catch(e){} }
        if(local && localForThisDeal){ restoreFromJson(local); saveState(); return; }  /* offline cache for same deal -> restore + push to server */
        if(hp){ applyPreset(); applyHandoff(hp); window.__lastHpSig=hpSig(hp); saveState(); }  /* genuinely new deal -> fill Leg B, everything else fresh */
      }
      var asked=false;
      try{ if(window.google&&google.script&&google.script.run){ google.script.run.withSuccessHandler(function(raw){ decide(raw||''); }).withFailureHandler(function(){ decide(''); }).pipeline_getCreativeLayout(dealKey); asked=true; } }catch(e){}
      if(!asked) decide('');
    });
  }

})();
