<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASAP Loan Tracker</title>
<style>
  :root{
    --brand:#1c75bc; --teal:#1ba3c9; --navy:#0e3f63;
    --ink:#0e1c2b; --muted:#64768a; --line:#e4eaf0; --bg:#f4f8fb; --card:#fff;
    --fit:#1e9e6a; --need:#c07d16; --fail:#c0392b; --comp:#c77400;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;}
  header{background:linear-gradient(120deg,var(--navy),var(--brand));color:#fff;padding:16px 0;}
  .bar{max-width:1860px;margin:0 auto;padding:0 16px;}
  .topnav{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
  header h1{margin:0;font-size:18px;font-weight:700;}
  header .sub{opacity:.85;font-size:12px;margin-top:2px;}
  .appnav{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
  .navt{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:999px;font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);cursor:pointer;text-decoration:none;}
  .navt:hover{background:rgba(255,255,255,.28);}
  .navt.active{background:#fff;color:var(--brand);border-color:#fff;}
  .navt.soon{opacity:.6;cursor:default;}
  .navt .nb{background:rgba(255,255,255,.28);border-radius:999px;padding:0 7px;font-size:11px;font-weight:800;}
  .navt.active .nb{background:#e8f1fb;color:var(--brand);}

  .seg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff;}
  .seg button{border:none;background:#fff;padding:8px 14px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;}
  .seg button.on{background:var(--brand);color:#fff;}
  .toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:16px 0 10px;}
  #search{flex:1;min-width:200px;max-width:360px;border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:14px;background:#fff;}
  .tbtn{background:#fff;color:var(--brand);border:1px solid var(--brand);border-radius:9px;padding:8px 13px;font-size:13px;font-weight:700;cursor:pointer;}
  .tbtn.solid{background:var(--brand);color:#fff;}
  .spacer{margin-left:auto;}
  .dchips{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px;}
  .dchip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 12px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;}
  .dchip:hover{border-color:var(--brand);}
  .dchip .n{background:#eef2f7;color:var(--ink);border-radius:999px;padding:0 7px;font-size:11px;font-weight:800;}
  .dchip.active{color:#fff;}
  .dchip .dot{width:9px;height:9px;border-radius:50%;flex:none;}

  .tablewrap{background:#fff;border:1px solid var(--line);border-radius:12px;overflow-x:auto;box-shadow:0 1px 2px rgba(16,40,70,.04);margin-bottom:16px;}
  table{border-collapse:collapse;width:100%;min-width:1680px;}
  thead th{position:sticky;top:0;background:#f7fafc;text-align:left;padding:10px 12px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);border-bottom:2px solid var(--line);white-space:nowrap;z-index:2;}
  th.num,td.num{text-align:right;}
  tbody td{padding:9px 12px;border-bottom:1px solid var(--line);white-space:nowrap;vertical-align:middle;font-size:13px;}
  tbody tr:hover{background:#eef6fc;}
  tbody tr.fupast{background:#fdecec;}
  tbody tr.fupast:hover{background:#fbdede;}
  td.name-td{border-left:5px solid #ccc;}
  .nm{display:flex;align-items:center;gap:8px;}
  .nm b{color:var(--ink);}
  .addr{color:var(--muted);max-width:190px;overflow:hidden;text-overflow:ellipsis;display:inline-block;vertical-align:bottom;}
  td.amt{font-weight:800;}
  td.compv{font-weight:800;color:var(--comp);text-align:right;cursor:pointer;}
  td.compv:hover,.editcell:hover{outline:1px dashed var(--brand);outline-offset:-2px;border-radius:6px;}
  .editcell{cursor:pointer;}
  .dsdot{width:15px;height:15px;border-radius:50%;display:inline-block;flex:none;cursor:pointer;box-shadow:0 0 0 2px #fff,0 0 0 3px rgba(0,0,0,.10);}
  .dsdot:hover{box-shadow:0 0 0 2px #fff,0 0 0 4px var(--brand);}
  .cardonly{color:#41505f;cursor:help;}
  .cardonly .lk{opacity:.38;font-size:11px;margin-left:6px;}
  .dash{color:#aab6c2;}
  .notes{color:#41505f;max-width:150px;overflow:hidden;text-overflow:ellipsis;display:inline-block;vertical-align:bottom;font-size:12px;}

  .pill{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:3px 10px;font-size:11.5px;font-weight:700;white-space:nowrap;cursor:pointer;border:1px dashed transparent;}
  .pill:hover{border-color:currentColor;}
  .pill .cv{opacity:.55;font-size:9px;}
  .selin{font-size:12.5px;font-weight:700;padding:4px 6px;border:2px solid var(--brand);border-radius:8px;background:#fff;color:var(--ink);cursor:pointer;}
  .txtin{font-size:12.5px;font-weight:700;padding:5px 7px;border:2px solid var(--brand);border-radius:8px;width:110px;}
  .ownpill{cursor:pointer;font-weight:700;color:#3a4a59;border:1px dashed transparent;border-radius:999px;padding:2px 8px;}
  .ownpill:hover{border-color:var(--brand);color:var(--brand);}

  .acts{display:flex;gap:6px;align-items:center;}
  .aico{border:1px solid var(--line);background:#fff;border-radius:7px;padding:4px 9px;display:inline-flex;align-items:center;gap:4px;cursor:pointer;font-size:12px;font-weight:700;color:var(--brand);text-decoration:none;}
  .aico:hover{background:#eef6fc;}

  .fubell{cursor:default;} .fu-od{color:#c0392b;font-weight:700;} .fu-due{color:#b07d18;font-weight:700;} .fu-up{color:#9aa7b4;} .fu-res{color:#1e8c5f;font-weight:800;}
  .fu-time{color:#5a6b7e;font-size:11.5px;font-weight:600;}
  .fubanner{background:#fdecec;border:1px solid #f3c6c6;border-radius:10px;padding:12px 14px;margin:14px 0;}
  .fb-top{font-size:13.5px;color:#8a2b2b;}
  .fb-list{margin:8px 0 6px 20px;color:#7a3535;font-size:13px;}
  .fb-list li{margin:2px 0;}
  .fb-note{font-size:12px;color:#9a5a5a;line-height:1.5;}
  .funone{background:#eef7f0;border:1px solid #cfe8d6;border-radius:10px;padding:10px 14px;margin:14px 0;font-size:12.5px;color:#2f7a4f;}

  .fu-active{outline:2px solid var(--brand);outline-offset:-2px;}
  .fu-back{position:fixed;inset:0;z-index:60;background:transparent;}
  .fu-pop{position:fixed;z-index:61;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 28px rgba(16,40,70,.18);padding:11px;min-width:240px;}
  .fu-pop-t{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:8px;}
  .fu-pop-row{display:flex;gap:6px;margin-bottom:9px;}
  .fu-pop-row input{font-size:12.5px;padding:6px 7px;border:1px solid var(--line);border-radius:7px;}
  .fu-pop-row input[type=date]{flex:1;} .fu-pop-row input[type=time]{width:98px;}
  .fu-pop-b{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .fu-hint{font-size:11px;color:var(--muted);}
  .fu-btns{display:flex;gap:7px;}
  .fu-clear{background:#fff;border:1px solid #e3b7b7;color:#b23b3b;border-radius:7px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;}
  .fu-clear:hover{background:#fdecec;}
  .fu-set{background:var(--brand);color:#fff;border:1px solid var(--brand);border-radius:7px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;}
  .fu-set:hover{background:#155a92;}

  .summ{display:grid;grid-template-columns:1.55fr 1fr;gap:16px;margin-bottom:40px;}
  @media(max-width:1000px){.summ{grid-template-columns:1fr;}}
  .panel{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .ph{background:#dff1f8;color:var(--navy);font-weight:800;font-size:12.5px;text-transform:uppercase;letter-spacing:.5px;padding:9px 14px;border-bottom:1px solid var(--line);}
  .pstats{display:grid;grid-template-columns:repeat(4,1fr);}
  .pstat{padding:13px 12px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);text-align:center;}
  .pstat .lab{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.3px;line-height:1.3;}
  .pstat .val{font-size:18px;font-weight:800;margin-top:5px;color:var(--navy);}
  .pstat .val.comp{color:var(--comp);}
  .mtbl{width:100%;border-collapse:collapse;font-size:13px;}
  .mtbl td,.mtbl th{padding:8px 14px;border-bottom:1px solid var(--line);text-align:left;}
  .mtbl th{font-size:10px;text-transform:uppercase;color:var(--muted);letter-spacing:.3px;background:#f7fafc;}
  .mtbl td.num,.mtbl th.num{text-align:right;}
  .mtbl tr.sel{background:#dff1f8;font-weight:700;}
  .mtbl td.mc{color:var(--comp);font-weight:800;}

  .colwrap{position:relative;display:inline-block;}
  .colmenu{position:absolute;top:calc(100% + 6px);right:0;z-index:50;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 28px rgba(16,40,70,.16);padding:8px;min-width:210px;}
  .cm-title{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);padding:4px 8px 8px;}
  .cm-item{display:flex;align-items:center;gap:9px;padding:6px 8px;font-size:13px;border-radius:7px;cursor:pointer;color:var(--ink);}
  .cm-item:hover{background:#f4f8fb;}
  .cm-item input{width:15px;height:15px;accent-color:var(--brand);cursor:pointer;}
  .cm-item.locked{color:#aab6c2;cursor:default;}
  .cm-item.locked .tagx{margin-left:auto;font-size:9.5px;text-transform:uppercase;}
  .cm-back{position:fixed;inset:0;z-index:40;background:transparent;}

  .expl{background:#eef4fb;border:1px solid #cfe0f2;color:#0e3f63;border-radius:10px;padding:11px 14px;font-size:12.5px;margin:14px 0;line-height:1.55;}
  .expl b{color:var(--navy);}
  .viewas{font-size:12.5px;color:var(--muted);font-weight:700;display:inline-flex;align-items:center;gap:6px;}
  .viewas select{border:1px solid var(--line);border-radius:8px;padding:5px 7px;font-weight:700;color:var(--ink);cursor:pointer;}
  .calc-tabs{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:16px 0;}
  .ctab{background:#eef4fb;color:var(--brand);border:1px solid #cfe0f2;border-radius:8px;padding:9px 15px;font-size:13px;font-weight:700;cursor:pointer;}
  .ctab:hover{background:var(--brand);color:#fff;border-color:var(--brand);}

  .state{max-width:1860px;margin:40px auto;padding:0 16px;text-align:center;color:var(--muted);}
  .spin{width:26px;height:26px;border:3px solid #d5e2ee;border-top-color:var(--brand);border-radius:50%;animation:sp 0.8s linear infinite;display:inline-block;vertical-align:middle;margin-right:10px;}
  @keyframes sp{to{transform:rotate(360deg)}}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#0e1c2b;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;z-index:80;box-shadow:0 8px 24px rgba(0,0,0,.25);opacity:0;transition:opacity .2s;}
  .toast.show{opacity:1;}
</style>
</head>
<body>

<header>
  <div class="bar topnav">
    <div><h1 id="hubTitle">ASAP Loan Tracker</h1><div class="sub" id="hubSub">Deal Status = the situation · Current Status = the processing step</div></div>
    <nav class="appnav" id="nav"></nav>
  </div>
</header>

<div class="bar" id="app"><div class="state"><span class="spin"></span>Loading your Loan Tracker…</div></div>
<div class="toast" id="toast"></div>

<script>
var TASK_BOARD_URL = 'https://script.google.com/a/macros/asap-funding.com/s/AKfycbw-fYZIXyDK9YfCJ2ZlmDJtzig1w83T3OSoDpASxeksqUSojAnfQ5aqQKcBQ8fd9e3J/exec';

var DEAL_STATUSES = ['Shopping','Planning','Secured','On Hold','Credit Repair','Nurture/Future','Dead','Funded'];
var DS_COLOR = {'Shopping':'#1c75bc','Planning':'#5a6b7e','Secured':'#1e8c5f','On Hold':'#c07d16','Credit Repair':'#6b4bbf','Nurture/Future':'#1391b3','Dead':'#b23b3b','Funded':'#127a4f'};
var ARCHIVED_DS = {'Dead':1,'Funded':1};
var CUR_STATUSES = ['','Application Sent','Application Received','Pre-Approved','Waiting on Docs','Processing','Underwriting','Clear to Close'];
var CS_COLOR = {'Application Sent':'#7c5cbf','Application Received':'#1391b3','Pre-Approved':'#1e9e6a','Waiting on Docs':'#c07d16','Processing':'#1c75bc','Underwriting':'#0e3f63','Clear to Close':'#127a4f'};
var OWNERS = ['DK','SP'];
function alpha(hex){ return hex+'1a'; }

function todayISO(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
var TODAY = todayISO();

var DEALS=[], LOADED=false, HUB='';
var SCOPE='active', DS_FILTER='all', SEARCH='', EDIT={id:null,field:null}, EDIT_POS={top:0,left:0};
var HIDDEN={}, COLMENU=false, LOCKED={name:true,acts:true};

/* ---------- data layer ---------- */
function load(){
  google.script.run
    .withSuccessHandler(function(res){
      if(res && res.ok){ DEALS=res.deals||[]; LOADED=true; render(); }
      else { showError(res && res.error ? res.error : 'Could not load the Loan Tracker.'); }
    })
    .withFailureHandler(function(err){ showError((err&&err.message)?err.message:String(err)); })
    .pipeline_getTracker();
}
function byId(id){ for(var i=0;i<DEALS.length;i++){ if(String(DEALS[i].id)===String(id)) return DEALS[i]; } return null; }
function saveField(id, field, value){
  google.script.run
    .withSuccessHandler(function(res){ if(!res || !res.ok){ toast('Save failed: '+((res&&res.error)||'')); load(); } })
    .withFailureHandler(function(err){ toast('Error saving — reloading.'); load(); })
    .pipeline_saveTrackerField(id, field, value);
}
var _tt=null;
function toast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'; if(_tt) clearTimeout(_tt); _tt=setTimeout(function(){ t.className='toast'; },2600); }
function showError(msg){ document.getElementById('app').innerHTML='<div class="state">⚠ '+esc(msg)+'<br><br><button class="tbtn" onclick="location.reload()">Retry</button></div>'; }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ---------- nav ---------- */
var VIEW='tracker', BOARD_N=null, CURRENT_USER='DK';
function renderNav(){
  var boardHref = HUB ? (HUB+(HUB.indexOf('?')>=0?'&':'?')+'dashboard') : '#';
  document.getElementById('nav').innerHTML =
    '<a class="navt" href="'+boardHref+'" target="_top">▦ Pipeline'+(BOARD_N!=null?' <span class="nb">'+BOARD_N+'</span>':'')+'</a>'+
    '<a class="navt" href="'+TASK_BOARD_URL+'" target="_blank" rel="noopener">✅ Task Board ↗</a>'+
    '<span class="navt '+(VIEW==='tracker'?'active':'')+'" onclick="setView(\'tracker\')" style="cursor:pointer">▤ Loan Tracker <span class="nb">'+activeTracker().length+'</span></span>'+
    '<span class="navt '+(VIEW==='crm'?'active':'')+'" onclick="setView(\'crm\')" style="cursor:pointer">👤 Contacts'+(CRM_LOADED?' <span class="nb">'+CRM.length+'</span>':'')+'</span>'+
    '<span class="navt '+(VIEW==='calc'?'active':'')+'" onclick="setView(\'calc\')" style="cursor:pointer"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" style="vertical-align:-2px"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6.5" x2="16" y2="6.5"/><circle cx="8.5" cy="11" r=".6" fill="currentColor"/><circle cx="12" cy="11" r=".6" fill="currentColor"/><circle cx="15.5" cy="11" r=".6" fill="currentColor"/><circle cx="8.5" cy="14.5" r=".6" fill="currentColor"/><circle cx="12" cy="14.5" r=".6" fill="currentColor"/><circle cx="15.5" cy="14.5" r=".6" fill="currentColor"/><circle cx="8.5" cy="18" r=".6" fill="currentColor"/><circle cx="12" cy="18" r=".6" fill="currentColor"/><circle cx="15.5" cy="18" r=".6" fill="currentColor"/></svg> Calculators</span>';
}
function setView(v){ VIEW=v; render(); }
function calcHTML(){
  var base = HUB ? (HUB+(HUB.indexOf('?')>=0?'&':'?')+'calc=1') : '#';
  function u(t){ return base+'&tab='+t; }
  return '<div class="expl"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" style="vertical-align:-2px"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6.5" x2="16" y2="6.5"/><circle cx="8.5" cy="11" r=".6" fill="currentColor"/><circle cx="12" cy="11" r=".6" fill="currentColor"/><circle cx="15.5" cy="11" r=".6" fill="currentColor"/><circle cx="8.5" cy="14.5" r=".6" fill="currentColor"/><circle cx="12" cy="14.5" r=".6" fill="currentColor"/><circle cx="15.5" cy="14.5" r=".6" fill="currentColor"/><circle cx="8.5" cy="18" r=".6" fill="currentColor"/><circle cx="12" cy="18" r=".6" fill="currentColor"/><circle cx="15.5" cy="18" r=".6" fill="currentColor"/></svg> <b>Calculators</b> — click any calculator below to open a <b>blank</b> version of it (for walk-up scenarios). Opening a deal from the Board instead prefills the right one with that borrower\'s numbers.</div>'+
    '<div class="calc-tabs">'+
      '<a class="ctab" style="text-decoration:none" href="'+u('dscr')+'" target="_blank" rel="noopener">DSCR ↗</a>'+
      '<a class="ctab" style="text-decoration:none" href="'+u('bff')+'" target="_blank" rel="noopener">Bridge / Fix &amp; Flip ↗</a>'+
      '<a class="ctab" style="text-decoration:none" href="'+u('commercial')+'" target="_blank" rel="noopener">Commercial ↗</a>'+
      '<a class="ctab" style="text-decoration:none" href="'+u('landdev')+'" target="_blank" rel="noopener">Land &amp; Dev ↗</a>'+
    '</div>';
}
function initUrl(){
  try{ google.script.url.getLocation(function(loc){ if(loc&&loc.parameter&&String(loc.parameter.view)==='crm'){ VIEW='crm'; if(LOADED) render(); } }); }catch(e){}
  google.script.run.withSuccessHandler(function(u){ HUB=u||''; if(LOADED) renderNav(); }).pipeline_hubUrl();
  google.script.run.withSuccessHandler(function(c){ BOARD_N=(c&&typeof c.board==='number')?c.board:null; if(LOADED) renderNav(); }).withFailureHandler(function(){}).pipeline_ltNavCounts();
}

/* ---------- helpers ---------- */
function fmtDate(iso){ if(!iso) return ''; var p=iso.split('-'); return parseInt(p[1],10)+'/'+parseInt(p[2],10)+'/'+p[0]; }
function fmtTime(t){ if(!t) return ''; var p=t.split(':'); var h=parseInt(p[0],10); var ap=h>=12?'PM':'AM'; var hh=h%12; if(hh===0)hh=12; return hh+':'+p[1]+' '+ap; }
function monthKey(iso){ return iso?iso.slice(0,7):''; }
function money(n){ return n==null?'':('$'+Number(n).toLocaleString()); }
function daysBetween(a,b){ return Math.round((Date.parse(b+'T00:00:00')-Date.parse(a+'T00:00:00'))/86400000); }
function isArchived(d){ return !!ARCHIVED_DS[d.dealStatus]; }
function activeTracker(){ return DEALS.filter(function(d){ return !isArchived(d); }); }
function archivedTracker(){ return DEALS.filter(isArchived); }
function fuLevel(d){
  if(!d.followISO || d.followResolved) return '';
  if(d.followISO<TODAY) return 'overdue';
  if(d.followISO===TODAY){
    var n=new Date(); var nowHM=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
    var dueAt=d.followTime||'07:00';                    // date-only reminders come due at 7am
    return nowHM>=dueAt ? 'due' : 'upcoming';           // nothing shows before the due moment
  }
  return 'upcoming';
}
function fuPast(d){ var l=fuLevel(d); return l==='overdue'||l==='due'; }

/* ---------- columns ---------- */
var COLS=[
  {k:'name',label:'Borrower'},{k:'addr',label:'Property'},{k:'lt',label:'Property Type'},{k:'purpose',label:'Loan Purpose'},{k:'amt',label:'Loan Amt',num:true},
  {k:'close',label:'Est. Close'},{k:'cs',label:'Current Status'},{k:'comp',label:'Expected Comp',num:true},
  {k:'owner',label:'Owner'},{k:'lender',label:'Lender'},{k:'follow',label:'Follow-Up'},{k:'notes',label:'Notes'},{k:'acts',label:'Actions'}
];
function visibleCols(){ return COLS.filter(function(c){ return !HIDDEN[c.k]; }); }

/* ---------- editable controls ---------- */
function openEdit(id,field){ EDIT={id:id,field:field}; render(); setTimeout(function(){ var i=document.querySelector('.editing-input'); if(i){ i.focus(); if(i.select){ try{i.select();}catch(e){} } } },0); }
function cancelEdit(){ EDIT={id:null,field:null}; render(); }

function dotControl(d){
  if(EDIT.id===d.id&&EDIT.field==='ds'){
    var o=DEAL_STATUSES.map(function(s){return '<option'+(s===d.dealStatus?' selected':'')+'>'+s+'</option>';}).join('')+
      '<option disabled>──────</option><option value="__delete__">Delete</option>';
    return '<select class="selin editing-input" onchange="dsPick('+q(d.id)+',this.value)" onblur="cancelEdit()">'+o+'</select>';
  }

function q(id){ return "'"+String(id).replace(/'/g,"\\'")+"'"; }

/* set a plain field: optimistic local update + server save */
function setField(id, field, raw){
  var d=byId(id); if(!d){ return; }
  var value=raw;
  if(field==='loanAmount'){
    var la=parseFloat(String(raw).replace(/[^0-9.]/g,''));
    if(isNaN(la)||la<0){ toast('Enter a valid loan amount.'); cancelEdit(); return; }
    d.loanAmount=la; value=la;
    // Expected Comp is NOT recomputed here — it comes from the calculator (Refresh deal)
    // or a manual override; loan-amount edits no longer touch it.
  }
  else if(field==='comp'){ var n=parseFloat(String(raw).replace(/[^0-9.]/g,'')); d.comp=isNaN(n)?null:n; value=(d.comp==null?'':d.comp); }
  else if(field==='lender'){ d.lender=String(raw).trim(); value=d.lender; }
  else if(field==='notes'){ d.notes=String(raw).trim(); value=d.notes; }
  else if(field==='owner'){ d.owner=String(raw).trim(); value=d.owner; }
  else if(field==='close'){ d.closeISO=String(raw||'').trim(); value=d.closeISO; }
  EDIT={id:null,field:null};
  saveField(id, field, value);
  render();
}
/* status change also resolves the follow-up nag locally (server mirrors it) */
function dsPick(id, value){
  if(value==='__delete__'){ EDIT={id:null,field:null}; removeDeal(id); return; }
  setStatus(id,'ds',value);
}
function setStatus(id, which, value){
  var d=byId(id); if(!d) return;
  if(which==='ds'){ d.dealStatus=value; d.followResolved=true; EDIT={id:null,field:null}; saveField(id,'dealStatus',value); }
  else { d.currentStatus=value; d.followResolved=true; EDIT={id:null,field:null}; saveField(id,'currentStatus',value); }
  render();
}

/* ---------- summary ---------- */
function monthWindow(){ var out=[], d=new Date(); d.setDate(1); for(var i=0;i<5;i++){ var key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); var lbl=d.toLocaleString('en-US',{month:'long'})+' '+d.getFullYear(); out.push({key:key,label:lbl,sel:i===0}); d.setMonth(d.getMonth()+1); } return out; }
function summaryHTML(){
  var rows=activeTracker();
  var ttlLoan=0,ttlComp=0,wod=0,proc=0,uw=0,ctc=0;
  rows.forEach(function(d){ ttlLoan+=(d.loanAmount||0); ttlComp+=(d.comp||0); if(d.currentStatus==='Waiting on Docs')wod++; if(d.currentStatus==='Processing')proc++; if(d.currentStatus==='Underwriting')uw++; if(d.currentStatus==='Clear to Close')ctc++; });
  var avg=rows.length?Math.round(ttlComp/rows.length):0;
  var S=[['TTL Loan Amount',money(ttlLoan)||'$0',''],['TTL Est. Comp',money(ttlComp)||'$0','comp'],['Avg. Comp / Loan',money(avg)||'$0','comp'],['Active Loans',String(rows.length),''],['Waiting on Docs',String(wod),''],['In Processing',String(proc),''],['Underwriting',String(uw),''],['Clear to Close',String(ctc),'']];
  var ps=S.map(function(s){return '<div class="pstat"><div class="lab">'+s[0]+'</div><div class="val '+s[2]+'">'+s[1]+'</div></div>';}).join('');
  var months=monthWindow();
  var mrows=months.map(function(m){var mc=0,ml=0;rows.forEach(function(d){if(monthKey(d.closeISO)===m.key){mc+=(d.comp||0);ml++;}});return '<tr class="'+(m.sel?'sel':'')+'"><td>'+m.label+'</td><td class="num mc">'+(money(mc)||'$0')+'</td><td class="num">'+ml+'</td></tr>';}).join('');
  return '<div class="summ"><div class="panel"><div class="ph">Active Pipeline Summary</div><div class="pstats">'+ps+'</div></div>'+
         '<div class="panel"><div class="ph">Monthly Comp Projection (by close date)</div><table class="mtbl"><tr><th>Month</th><th class="num">Expected Comp</th><th class="num">Loans</th></tr>'+mrows+'</table></div></div>';
}

    var dayBtns=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(function(dd){
      var on=!!dset[dd];
      return '<span onclick="dripSave(\''+c.campaign.replace(/'/g,"\\'")+'\',\'day\',\''+dd+'\',this)" style="cursor:pointer;display:inline-block;width:20px;text-align:center;border-radius:5px;font-size:10px;font-weight:800;padding:2px 0;margin:0 1px;'+(on?'background:var(--brand);color:#fff':'background:#eef2f7;color:#9aa7b4')+'">'+dd[0]+'</span>';
    }).join('');
    var isExp=CAMP_EXP===c.campaign;
    var r='<tr><td style="padding:7px 8px;font-weight:700;font-size:12.5px;cursor:pointer" onclick="campExp(\''+c.campaign.replace(/'/g,"\\'")+'\')">'+esc(c.campaign)+' <span style="opacity:.5;font-size:10px">'+(isExp?'▲ hide emails':'▼ view / edit 12 emails')+'</span></td>'+
      '<td style="padding:7px 8px;text-align:center"><input type="checkbox" '+(c.active?'checked':'')+' style="width:15px;height:15px;accent-color:var(--brand)" onchange="dripSave(\''+c.campaign.replace(/'/g,"\\'")+'\',\'active\',this.checked,this)"></td>'+
      '<td style="padding:7px 8px"><input type="number" min="1" value="'+c.freq+'" style="width:52px;font-size:12px;padding:3px 5px;border:1px solid var(--line);border-radius:6px" onchange="dripSave(\''+c.campaign.replace(/'/g,"\\'")+'\',\'freq\',this.value)"></td>'+
      '<td style="padding:7px 8px;white-space:nowrap">'+timeSel+'</td>'+
      '<td style="padding:7px 8px;white-space:nowrap">'+dayBtns+'</td>'+
      '<td style="padding:7px 8px">'+send+'</td>'+
      '<td style="padding:7px 8px;text-align:center;font-size:12px">'+(c.contacts||0)+'</td>'+
      '<td style="padding:7px 8px;text-align:center"><a class="aico" href="#" style="color:#b23b3b;border:0" title="Delete this campaign" onclick="dripDelete(\''+c.campaign.replace(/'/g,"\\'")+'\');return false;">🗑</a></td></tr>';
    if(isExp){
      r+='<tr><td colspan="8" style="padding:4px 8px 12px;background:#f7fafc">'+
        '<div style="font-size:10.5px;font-weight:800;color:var(--muted);text-transform:uppercase;margin:6px 0 4px">Click any email to view and edit it</div>'+
        (c.subjects||[]).map(function(x,k){
          var isOpen=DRIP_EMAIL&&DRIP_EMAIL.camp===c.campaign&&DRIP_EMAIL.idx===k;
          var row='<div style="font-size:12px;padding:4px 0;border-bottom:1px dashed var(--line);cursor:pointer" onclick="dripEmailOpen(\''+c.campaign.replace(/'/g,"\\'")+'\','+k+')"><b style="color:var(--brand)">#'+(k+1)+'</b> '+esc(x)+' <span style="opacity:.45;font-size:10px">'+(isOpen?'▲':'✎ edit')+'</span></div>';
          if(isOpen){
            if(DRIP_EMAIL.loading){ row+='<div style="padding:8px;color:var(--muted);font-size:12px">Loading…</div>'; }
            else {
              row+='<div style="background:#fff;border:1px solid var(--line);border-radius:8px;padding:10px;margin:6px 0" onclick="event.stopPropagation()">'+
                '<div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;margin-bottom:4px">Subject'+(DRIP_EMAIL.edited?' <span style="color:#c07d16">(edited — Reset restores the original)</span>':'')+'</div>'+
                '<input id="deSubj" value="'+esc(DRIP_EMAIL.subject)+'" style="width:100%;font-size:13px;font-weight:700;padding:6px 8px;border:1px solid var(--line);border-radius:7px;margin-bottom:8px">'+
                '<div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;margin-bottom:4px">Body — {FIRST} becomes the contact\'s first name; signature + disclaimer are added on send</div>'+
                '<textarea id="deBody" style="width:100%;min-height:170px;font-size:13px;line-height:1.5;padding:8px;border:1px solid var(--line);border-radius:7px;font-family:inherit">'+esc(DRIP_EMAIL.body)+'</textarea>'+
                '<div style="display:flex;justify-content:flex-end;gap:7px;margin-top:8px">'+
                  '<button class="fu-clear" '+(DRIP_EMAIL.saving?'disabled':'')+' onclick="dripEmailSave(true)">Reset to original</button>'+
                  '<button class="fu-clear" style="color:var(--muted);border-color:var(--line)" onclick="dripEmailClose()">Close</button>'+
                  '<button class="fu-set" '+(DRIP_EMAIL.saving?'disabled':'')+' onclick="dripEmailSave(false)">'+(DRIP_EMAIL.saving?'Saving…':'Save email')+'</button>'+
                '</div></div>';
            }
          }
          return row;
        }).join('')+'</td></tr>';
    }
    return r;
  }).join('');
  return '<div class="fu-back" onmousedown="dripClose()"></div>'+
    '<div class="fu-pop" id="dripPop" style="top:70px;left:50%;transform:translateX(-50%);width:820px;max-width:96vw;max-height:82vh;overflow:auto">'+
      '<div class="fu-pop-t" style="display:flex;justify-content:space-between;align-items:center">Manage Drip Campaigns <button class="fu-set" style="font-size:11px" onmousedown="event.preventDefault();dripCreate()">＋ New campaign (AI)</button></div>'+
      '<div style="font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.5">Each campaign has 12 pre-written emails, sent one per <b>Every (days)</b> — default monthly. {FIRST} personalizes each email; the chosen sender\'s signature and disclaimer are added automatically. Assign a contact\'s Campaign in the table to start them at email #1.</div>'+
      dripNewForm()+
      '<table style="width:100%;border-collapse:collapse"><tr>'+
        '<th style="text-align:left;padding:6px 8px;font-size:10px;color:var(--muted);text-transform:uppercase">Campaign</th>'+
        '<th style="padding:6px 8px;font-size:10px;color:var(--muted);text-transform:uppercase">Active</th>'+
        '<th style="text-align:left;padding:6px 8px;font-size:10px;color:var(--muted);text-transform:uppercase">Every (days)</th>'+
        '<th style="text-align:left;padding:6px 8px;font-size:10px;color:var(--muted);text-transform:uppercase">Time</th>'+
        '<th style="text-align:left;padding:6px 8px;font-size:10px;color:var(--muted);text-transform:uppercase">Days</th>'+
        '<th style="text-align:left;padding:6px 8px;font-size:10px;color:var(--muted);text-transform:uppercase">From</th>'+
        '<th style="padding:6px 8px;font-size:10px;color:var(--muted);text-transform:uppercase">Contacts</th><th></th></tr>'+rows+'</table>'+
      '<div style="display:flex;justify-content:flex-end;margin-top:10px"><button class="fu-set" onmousedown="event.preventDefault();dripClose()">Done</button></div>'+
    '</div>';
}

/* ---------- calculator preload: load the dashboard in a hidden frame so the
   calc icon opens instantly; falls back to normal navigation if not ready ---------- */
var PRE_READY=false, PRE_FRAME=null;
function preReadyPoll(){
  if(PRE_READY) return;
  google.script.run.withSuccessHandler(function(ok){
    if(ok){ PRE_READY=true; toast('\u26a1 Calculators pre-loaded \u2014 deal opens are instant now.'); }
    else { setTimeout(preReadyPoll, 1500); }
  }).withFailureHandler(function(){ setTimeout(preReadyPoll, 2500); }).pipeline_embedReadyCheck();
}
function preloadDash(){
  if(PRE_FRAME||!HUB) return;
  try{
    PRE_FRAME=document.createElement('iframe');
    PRE_FRAME.id='preDash';
    PRE_FRAME.src=HUB+(HUB.indexOf('?')>=0?'&':'?')+'dashboard&embed=1';
    setTimeout(preReadyPoll, 3000);
    PRE_FRAME.style.cssText='position:fixed;inset:0;width:100%;height:100%;border:0;display:none;z-index:400;background:#fff;';
    document.body.appendChild(PRE_FRAME);
  }catch(e){}
}
function preOpen(id){
  if(!PRE_READY||!PRE_FRAME){ toast('Still pre-loading \u2014 using the standard load this once.'); return true; }
  try{
    google.script.run.withFailureHandler(function(){}).pipeline_embedOpenSet(id);
    PRE_FRAME.style.display='block';
    var bar=document.getElementById('preBack');
    if(!bar){
      bar=document.createElement('div'); bar.id='preBack';
      bar.style.cssText='position:fixed;top:10px;left:10px;z-index:401;';
      bar.innerHTML='<button onclick="preClose()" style="background:#0e3f63;color:#fff;border:0;border-radius:999px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.25)">\u2190 Back to Loan Tracker</button>';
      document.body.appendChild(bar);
    }
    bar.style.display='block';
    return false;                                      // suppress navigation
  }catch(e){ return true; }
}
function preClose(){
  if(PRE_FRAME) PRE_FRAME.style.display='none';
  var bar=document.getElementById('preBack'); if(bar) bar.style.display='none';
}
(function armPreload(){ if(HUB){ preloadDash(); } else { setTimeout(armPreload, 400); } })();

/* ---------- boot ---------- */
initUrl();
load();
crmLoad();
</script>
